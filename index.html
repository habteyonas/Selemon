<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selemon Abrha — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --emerald: #00C896;
    --emerald-dark: #009e77;
    --emerald-glow: rgba(0,200,150,0.25);
    --gold: #F0B429;
    --ink: #0A0F1E;
    --ink-mid: #1a2235;
    --ink-light: #2e3e5a;
    --white: #ffffff;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.18;
    animation: orbFloat 15s ease-in-out infinite;
  }
  .orb-1 { width:500px; height:500px; background: var(--emerald); top:-150px; left:-100px; animation-delay: 0s; }
  .orb-2 { width:400px; height:400px; background: #005fff; bottom:-100px; right:-50px; animation-delay: -5s; }
  .orb-3 { width:300px; height:300px; background: var(--gold); top:40%; left:60%; animation-delay: -9s; }

  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-40px) scale(1.05); }
    66% { transform: translate(-20px,25px) scale(0.95); }
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,15,30,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    transition: all 0.3s;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    color: var(--emerald);
    letter-spacing: -0.5px;
  }
  .nav-links { display: flex; gap: 30px; list-style: none; }
  .nav-links a {
    color: rgba(255,255,255,0.7); text-decoration: none;
    font-size: 0.875rem; font-weight: 500; letter-spacing: 0.5px;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 2px; background: var(--emerald);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--emerald); }
  .nav-links a:hover::after { width: 100%; }

  /* ── SECTIONS WRAPPER ── */
  main { position: relative; z-index: 1; }

  section { padding: 100px 40px; max-width: 1100px; margin: 0 auto; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding-top: 120px;
    max-width: 1200px;
    margin: 0 auto;
    gap: 60px;
    flex-wrap: wrap;
  }
  .hero-text { flex: 1; min-width: 300px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,200,150,0.1); border: 1px solid var(--emerald-glow);
    padding: 6px 16px; border-radius: 999px;
    font-size: 0.78rem; font-weight: 600; color: var(--emerald);
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 24px;
    animation: fadeUp 0.8s ease both;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--emerald);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--emerald-glow); }
    50% { box-shadow: 0 0 0 8px transparent; }
  }
  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 900; line-height: 1.05;
    color: var(--white);
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .hero-name span { color: var(--emerald); }
  .hero-subtitle {
    font-size: clamp(1rem, 2.5vw, 1.3rem); font-weight: 300;
    color: rgba(255,255,255,0.55); margin: 16px 0 32px;
    animation: fadeUp 0.8s 0.2s ease both;
    line-height: 1.7;
  }
  .hero-cta {
    display: flex; gap: 16px; flex-wrap: wrap;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .btn-primary, .btn-outline {
    padding: 14px 32px; border-radius: 8px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: all 0.25s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--emerald); color: var(--ink);
    border: 2px solid var(--emerald);
    box-shadow: 0 0 30px var(--emerald-glow);
  }
  .btn-primary:hover { background: var(--emerald-dark); transform: translateY(-2px); box-shadow: 0 8px 30px var(--emerald-glow); }
  .btn-outline {
    background: transparent; color: var(--white);
    border: 2px solid var(--glass-border);
  }
  .btn-outline:hover { border-color: var(--emerald); color: var(--emerald); transform: translateY(-2px); }

  /* avatar area */
  .hero-visual {
    flex: 0 0 320px;
    animation: fadeUp 0.8s 0.4s ease both;
    position: relative;
  }
  .avatar-ring {
    width: 280px; height: 280px; border-radius: 50%;
    background: linear-gradient(135deg, var(--emerald), #005fff, var(--gold));
    padding: 4px;
    animation: spinSlow 8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spinSlow { to { transform: rotate(360deg); } }
  .avatar-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--ink-mid);
    overflow: hidden;
    animation: spinSlow 8s linear infinite reverse;
  }
  .avatar-inner img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    border-radius: 50%;
    animation: spinSlow 8s linear infinite; /* counter-rotate to stay upright */
  }
  .avatar-icon {
    font-size: 80px; line-height: 1;
    filter: drop-shadow(0 0 20px var(--emerald-glow));
  }
  .avatar-label {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
    color: var(--emerald); text-transform: uppercase;
  }
  .floating-tags {
    position: absolute; inset: 0; pointer-events: none;
  }
  .ftag {
    position: absolute; background: var(--glass);
    border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
    padding: 6px 14px; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600; white-space: nowrap;
    animation: tagFloat 4s ease-in-out infinite;
  }
  .ftag:nth-child(1) { top: 0; right: -20px; animation-delay: 0s; color: var(--emerald); }
  .ftag:nth-child(2) { bottom: 40px; left: -30px; animation-delay: -1.5s; color: var(--gold); }
  .ftag:nth-child(3) { top: 50%; right: -40px; animation-delay: -3s; color: #7eb3ff; }
  @keyframes tagFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION HEADER ── */
  .sec-header { text-align: center; margin-bottom: 60px; }
  .sec-label {
    display: inline-block; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--emerald); margin-bottom: 12px;
  }
  .sec-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 700;
    color: var(--white);
  }
  .sec-title em { color: var(--emerald); font-style: normal; }
  .sec-line {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--emerald), var(--gold));
    border-radius: 2px; margin: 16px auto 0;
  }

  /* ── ABOUT ── */
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 50px;
    align-items: start;
  }
  .about-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 36px;
    backdrop-filter: blur(10px);
    transition: transform 0.3s, border-color 0.3s;
  }
  .about-card:hover { transform: translateY(-4px); border-color: var(--emerald); }
  .about-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700; margin-bottom: 12px;
    color: var(--emerald);
  }
  .about-card p { color: rgba(255,255,255,0.65); line-height: 1.8; font-size: 0.93rem; }
  .info-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
  .info-list li {
    display: flex; align-items: center; gap: 14px;
    font-size: 0.9rem; color: rgba(255,255,255,0.75);
  }
  .info-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(0,200,150,0.12); border: 1px solid var(--emerald-glow);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .info-list li strong { color: var(--white); display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
  }
  .skill-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 28px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    text-align: center; cursor: default;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    position: relative; overflow: hidden;
  }
  .skill-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, var(--emerald-glow), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .skill-card:hover::before { opacity: 1; }
  .skill-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--emerald);
    box-shadow: 0 16px 40px rgba(0,200,150,0.12);
  }
  .skill-card img {
    width: 48px; height: 48px; object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
    transition: transform 0.3s;
  }
  .skill-card:hover img { transform: scale(1.15) rotate(-5deg); }
  .skill-name {
    font-size: 0.82rem; font-weight: 600;
    color: rgba(255,255,255,0.8); letter-spacing: 0.3px;
  }
  .skill-bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .skill-bar {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--emerald), var(--gold));
    transform: scaleX(0); transform-origin: left;
    transition: transform 1s 0.3s ease;
  }
  .skill-card:hover .skill-bar { transform: scaleX(1); }

  /* ── PROJECTS ── */
  .projects-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 28px;
  }
  .project-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 32px;
    transition: transform 0.3s, border-color 0.3s;
    position: relative; overflow: hidden;
  }
  .project-card::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--emerald), var(--gold));
    transform: scaleX(0); transform-origin: left; transition: transform 0.4s;
  }
  .project-card:hover::after { transform: scaleX(1); }
  .project-card:hover { transform: translateY(-5px); border-color: var(--emerald); }
  .project-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: rgba(0,200,150,0.1); border: 1px solid var(--emerald-glow);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; margin-bottom: 20px;
  }
  .project-card h3 {
    font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
    color: var(--white); margin-bottom: 10px;
  }
  .project-card p { font-size: 0.88rem; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 20px; }
  .project-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .ptag {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px;
    padding: 4px 12px; border-radius: 999px;
    background: rgba(0,200,150,0.1); color: var(--emerald);
    border: 1px solid var(--emerald-glow);
  }

  /* ── CONTACT ── */
  .contact-wrapper {
    display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: start;
  }
  .contact-info h3 {
    font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700;
    margin-bottom: 16px;
  }
  .contact-info p { color: rgba(255,255,255,0.55); line-height: 1.8; font-size: 0.93rem; margin-bottom: 32px; }
  .contact-items { display: flex; flex-direction: column; gap: 16px; }
  .contact-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-radius: 14px;
    background: var(--glass); border: 1px solid var(--glass-border);
    transition: border-color 0.3s;
  }
  .contact-item:hover { border-color: var(--emerald); }
  .ci-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(0,200,150,0.1); border: 1px solid var(--emerald-glow);
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    flex-shrink: 0;
  }
  .ci-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--emerald); margin-bottom: 2px; }
  .ci-value { font-size: 0.9rem; color: rgba(255,255,255,0.8); }
  .contact-form { display: flex; flex-direction: column; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }
  .form-group input, .form-group textarea {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 14px 16px;
    color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--emerald);
    box-shadow: 0 0 0 3px var(--emerald-glow);
  }
  .form-group textarea { resize: vertical; min-height: 120px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--glass-border);
    padding: 30px 40px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
    position: relative; z-index: 1;
    background: rgba(10,15,30,0.5); backdrop-filter: blur(10px);
  }
  .footer-copy { font-size: 0.82rem; color: rgba(255,255,255,0.35); }
  .footer-socials { display: flex; gap: 12px; }
  .social-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; text-decoration: none;
    transition: all 0.25s; cursor: pointer;
  }
  .social-btn:hover { background: var(--emerald); border-color: var(--emerald); transform: translateY(-2px); }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0; transform: translateY(36px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .nav-links { display: none; }
    .hero { padding: 100px 20px 60px; flex-direction: column; gap: 40px; }
    .hero-visual { flex: 0 0 auto; }
    section { padding: 70px 20px; }
    .about-grid, .contact-wrapper { grid-template-columns: 1fr; }
    footer { justify-content: center; text-align: center; }
  }

  /* Hamburger for mobile */
  .hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    background: none; border: none; padding: 4px;
  }
  .hamburger span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: 0.3s; }
  @media (max-width: 768px) { .hamburger { display: flex; } }
</style>
</head>
<body>

<!-- Animated Background Orbs -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Navigation -->
<nav>
  <div class="nav-logo">SA.</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile Nav Dropdown -->
<div id="mobileNav" style="display:none;position:fixed;top:64px;left:0;right:0;z-index:99;background:rgba(10,15,30,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);padding:20px;display:none;flex-direction:column;gap:16px;">
  <a href="#about" onclick="toggleNav()" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);">About</a>
  <a href="#skills" onclick="toggleNav()" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);">Skills</a>
  <a href="#projects" onclick="toggleNav()" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);">Projects</a>
  <a href="#contact" onclick="toggleNav()" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:8px 0;">Contact</a>
</div>

<main>

<!-- ── HERO ── -->
<div class="hero" style="padding-left:40px;padding-right:40px;">
  <div class="hero-text">
    <div class="hero-badge">
      <div class="badge-dot"></div>
      Available for work
    </div>
    <h1 class="hero-name">
      Selemon<br><span>Abrha</span>
    </h1>
    <p class="hero-subtitle">
      BSc in Information Technology · Full-Stack Developer<br>
      Building elegant digital experiences from Ethiopia.
    </p>
    <div class="hero-cta">
      <a href="#contact" class="btn-primary">
        <span>💬</span> Get In Touch
      </a>
      <a href="#projects" class="btn-outline">
        <span>🚀</span> View Projects
      </a>
    </div>
  </div>
  <div class="hero-visual">
